<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>RWF - Response Confirmed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #18181B;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
    min-height: 100vh;
    min-width: 1280px;
    background: linear-gradient(180deg, #F0F4FA 0%, #FFFFFF 60%, #F8F9FB 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  /* ─── Card ─── */
  .confirm-card {
    width: 100%;
    max-width: 480px;
    background: #FFFFFF;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.04);
    border: 1px solid #E4E4E7;
    padding: 48px 40px 40px;
    text-align: center;
  }

  /* ─── Checkmark Circle ─── */
  .check-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #EBF0F9;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    position: relative;
  }

  .check-circle::before {
    content: "";
    position: absolute;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: rgba(43,94,167,0.06);
    top: -8px;
    left: -8px;
  }

  .check-circle svg {
    position: relative;
    z-index: 1;
  }

  /* ─── Text ─── */
  .confirm-heading {
    font-size: 22px;
    font-weight: 700;
    color: #18181B;
    margin-bottom: 16px;
    letter-spacing: -0.3px;
  }

  .confirm-choice {
    font-size: 15px;
    color: #52525B;
    margin-bottom: 8px;
  }

  .confirm-choice strong {
    color: #18181B;
    font-weight: 600;
  }

  .confirm-detail {
    font-size: 14px;
    color: #71717A;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  /* ─── Button ─── */
  .btn-portal {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 32px;
    background: #2B5EA7;
    color: #FFFFFF;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    text-decoration: none;
    min-height: 50px;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    letter-spacing: 0.2px;
  }

  .btn-portal:hover {
    background: #1E4A8A;
    box-shadow: 0 4px 12px rgba(43,94,167,0.25);
  }

  .btn-portal:active {
    transform: scale(0.98);
  }

  .btn-portal .arrow {
    font-size: 16px;
    transition: transform 0.15s;
  }

  .btn-portal:hover .arrow {
    transform: translateX(2px);
  }

  /* ─── Powered by ─── */
  .powered-by {
    margin-top: 28px;
    font-size: 12px;
    color: #A1A1AA;
    letter-spacing: 0.3px;
    text-align: center;
  }

  .powered-by span {
    color: #71717A;
    font-weight: 500;
  }
</style>
</head>
<body>

  <div class="confirm-card">

    <!-- Checkmark Circle -->
    <div class="check-circle">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="19" cy="19" r="19" fill="#2B5EA7"/>
        <path d="M11 19.5L16.5 25L27 14" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Heading -->
    <h1 class="confirm-heading">Your response has been saved</h1>

    <!-- Choice -->
    <p class="confirm-choice">You chose: <strong>Wait for Next Batch</strong></p>

    <!-- Detail -->
    <p class="confirm-detail">
      We'll notify you when a slot opens in <strong>Stitching &ndash; Basic</strong>.
    </p>

    <!-- Portal Button -->
    <a class="btn-portal" href="#">
      Go to Renukiran Portal
      <span class="arrow">&rarr;</span>
    </a>

  </div>

  <div class="powered-by">Powered by <span>RWF</span></div>

</body>
</html>
