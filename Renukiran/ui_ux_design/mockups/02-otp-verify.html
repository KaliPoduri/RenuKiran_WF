<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0">
  <title>RWF Learning Portal - Verify OTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #18181B;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      min-height: 100vh;
      background: linear-gradient(180deg, #F0F4FA 0%, #FFFFFF 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Language selector */
    .lang-selector {
      position: fixed;
      top: 24px;
      right: 32px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #FFFFFF;
      border: 1px solid #E4E4E7;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 500;
      color: #52525B;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: border-color 0.15s;
    }
    .lang-selector:hover {
      border-color: #D4D4D8;
    }
    .lang-selector .globe {
      width: 16px;
      height: 16px;
      opacity: 0.6;
    }

    /* Card */
    .otp-card {
      width: 420px;
      background: #FFFFFF;
      border-radius: 16px;
      box-shadow: 0 10px 15px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.05);
      border: 1px solid #E4E4E7;
      padding: 32px 36px 32px;
      position: relative;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid #E4E4E7;
      background: #FFFFFF;
      color: #52525B;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 28px;
    }
    .back-btn:hover {
      background: #FAFAFA;
      border-color: #D4D4D8;
    }

    /* Lock icon */
    .lock-icon-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .lock-icon-circle {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: #EBF0F9;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lock-icon-circle svg {
      width: 26px;
      height: 26px;
      color: #2B5EA7;
    }

    /* Heading */
    .otp-heading {
      font-size: 22px;
      font-weight: 700;
      color: #18181B;
      text-align: center;
      margin-bottom: 8px;
    }
    .otp-subtext {
      font-size: 14px;
      color: #71717A;
      text-align: center;
      margin-bottom: 36px;
    }
    .otp-subtext .phone {
      color: #3F3F46;
      font-weight: 500;
    }

    /* OTP Boxes */
    .otp-inputs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .otp-box {
      width: 48px;
      height: 56px;
      border: 2px solid #D4D4D8;
      border-radius: 10px;
      font-size: 22px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      text-align: center;
      color: #18181B;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #FFFFFF;
      caret-color: #2B5EA7;
    }
    .otp-box:focus {
      border-color: #2B5EA7;
      box-shadow: 0 0 0 3px rgba(43,94,167,0.12);
    }
    /* Simulate filled state on first 3 boxes */
    .otp-box.filled {
      border-color: #2B5EA7;
      background: #F0F4FA;
    }
    /* Simulate active/focused state on 4th box */
    .otp-box.active {
      border-color: #2B5EA7;
      box-shadow: 0 0 0 3px rgba(43,94,167,0.12);
    }

    /* Verify Button */
    .btn-verify {
      width: 100%;
      padding: 14px 28px;
      background: #2B5EA7;
      color: #FFFFFF;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      min-height: 50px;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .btn-verify:hover {
      background: #1E4A8A;
    }
    .btn-verify:active {
      transform: scale(0.99);
    }

    /* Resend */
    .resend-text {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #71717A;
    }
    .resend-text .timer {
      color: #2B5EA7;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* Powered by */
    .powered-by {
      margin-top: 32px;
      font-size: 12px;
      color: #A1A1AA;
      letter-spacing: 0.3px;
    }
    .powered-by span {
      color: #71717A;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- Language Selector -->
  <div class="lang-selector">
    <svg class="globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="2" y1="12" x2="22" y2="12"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    English &#9662;
  </div>

  <!-- OTP Card -->
  <div class="otp-card">

    <!-- Back Arrow -->
    <button class="back-btn" title="Go back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </button>

    <!-- Lock Icon -->
    <div class="lock-icon-wrap">
      <div class="lock-icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          <circle cx="12" cy="16.5" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="otp-heading">Enter verification code</h1>
    <p class="otp-subtext">Sent to <span class="phone">+91 98765 XXXXX</span></p>

    <!-- OTP Input Boxes -->
    <div class="otp-inputs">
      <input type="text" class="otp-box filled" value="4" maxlength="1" readonly>
      <input type="text" class="otp-box filled" value="7" maxlength="1" readonly>
      <input type="text" class="otp-box filled" value="2" maxlength="1" readonly>
      <input type="text" class="otp-box active" value="" maxlength="1" placeholder="&#8226;">
      <input type="text" class="otp-box" value="" maxlength="1" placeholder="&#8226;">
      <input type="text" class="otp-box" value="" maxlength="1" placeholder="&#8226;">
    </div>

    <!-- Verify Button -->
    <button class="btn-verify">Verify</button>

    <!-- Resend -->
    <p class="resend-text">Didn't receive code? Resend in <span class="timer">0:28</span></p>
  </div>

  <!-- Powered by -->
  <div class="powered-by">Powered by <span>RWF</span></div>

</body>
</html>
